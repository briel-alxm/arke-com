<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BrielOS · UI Kit</title>
<style>
/* ============================================================
   BrielOS · brielos.com UI kit — SELF-CONTAINED BUNDLE
   colors_and_type.css (tokens) + UI-kit styles, inlined.
   No external CSS imports required.
   ============================================================ */

/* ============================================================
   BrielOS · Briel_style v1
   Colors, Type, Spacing tokens
   ────────────────────────────────────────────────────────────
   Doctrine palette — Obsidian Ink + Bone White +
   Atmospheric (Deep Forest, Storm Teal, Lunar Blue, Ash Mauve)
   Ceremonial accents (Ether Gold, Oxide Copper, Pale Sage)
   ============================================================ */

@import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Tenor+Sans&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap");

:root {
  /* ── Foundation Neutrals ───────────────────────────────── */
  --obsidian-ink:   #111315;  /* Operational gravity. Signal integrity. */
  --iron-slate:     #2B3137;  /* Secondary systems hierarchy. */
  --soft-graphite:  #4A525A;  /* Muted hierarchy, supporting structure. */
  --bone-white:     #F4F1EA;  /* Warmth against technical structure. */
  --bone-white-2:   #EDE8DE;  /* Second cream — recessed surfaces. */
  --vellum:         #FAF7F0;  /* Page background — vellum. */

  /* ── Atmospheric Colors (thinking space) ───────────────── */
  --deep-forest:    #1F3B34;  /* Strongest signal color. Sovereign calm. */
  --storm-teal:     #355C63;  /* Active decisions. Bridge structure/intuition. */
  --lunar-blue:     #667A8A;  /* Quiet cognition. Reflective. */
  --ash-mauve:      #8B7E86;  /* Humanity without cliché. */

  /* ── Accent & Signal (rare, ceremonial) ────────────────── */
  --ether-gold:     #C7A86D;  /* Ceremonial. Principle moments only. */
  --oxide-copper:   #9A6A4A;  /* Human warmth within structure. */
  --pale-sage:      #C7D1C2;  /* Recovery, rest, breathing. */

  /* ── Operational signals ───────────────────────────────── */
  --signal-stable:  #1F3B34;  /* Stable ops = deep forest */
  --signal-active:  #355C63;  /* Active decision = storm teal */
  --signal-warn:    #9A6A4A;  /* Warning = oxide copper */
  --signal-rest:    #C7D1C2;  /* Rest / completed */

  /* ── Semantic surfaces ─────────────────────────────────── */
  --bg:             var(--vellum);
  --bg-recessed:    var(--bone-white-2);
  --bg-card:        #FFFFFF;
  --bg-inverse:     var(--obsidian-ink);
  --bg-inverse-2:   var(--iron-slate);

  /* ── Semantic text ─────────────────────────────────────── */
  --fg:             var(--obsidian-ink);
  --fg-1:           var(--obsidian-ink);
  --fg-2:           var(--iron-slate);
  --fg-3:           var(--soft-graphite);
  --fg-4:           var(--lunar-blue);
  --fg-on-dark:     var(--bone-white);
  --fg-on-dark-2:   #B7B0A4;

  /* ── Borders / rules ───────────────────────────────────── */
  --rule:           #DDD9D1;       /* hairline rule on cream */
  --rule-strong:    #C6C0B4;
  --rule-on-dark:   #2B3137;
  --rule-ceremony:  var(--ether-gold);

  /* ── Type families ─────────────────────────────────────── */
  --font-serif:     "Cormorant Garamond", "Cormorant", Georgia, "Times New Roman", serif;
  --font-sans:      "Tenor Sans", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-mono:      "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --font-body:      "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;

  /* ── Type sizes (modular, editorial restraint) ─────────── */
  --t-display:      clamp(44px, 5.5vw, 68px);
  --t-h1:           clamp(36px, 4vw, 52px);
  --t-h2:           clamp(28px, 3vw, 40px);
  --t-h3:           24px;
  --t-h4:           18px;
  --t-lead:         18px;
  --t-body:         15px;
  --t-small:        13px;
  --t-eyebrow:      10px;   /* Tenor Sans / Plex Mono, wide-tracked */
  --t-label:        11px;
  --t-data:         13px;

  /* ── Tracking (letter-spacing) ─────────────────────────── */
  --track-display:  -0.02em;
  --track-tight:    -0.01em;
  --track-body:     0;
  --track-label:    0.16em;
  --track-eyebrow:  0.28em;
  --track-data:     0.04em;

  /* ── Spacing scale (8pt grid) ──────────────────────────── */
  --s-1:  4px;
  --s-2:  8px;
  --s-3:  12px;
  --s-4:  16px;
  --s-5:  24px;
  --s-6:  32px;
  --s-7:  48px;
  --s-8:  64px;
  --s-9:  80px;
  --s-10: 120px;

  /* ── Radii (restrained, mostly square) ─────────────────── */
  --r-0:  0px;       /* default — editorial restraint */
  --r-1:  2px;       /* status badges, tags */
  --r-2:  4px;       /* buttons, inputs */
  --r-3:  6px;       /* cards (rare) */
  --r-pill: 999px;   /* avatars, dots */

  /* ── Shadows (matte, never glossy) ─────────────────────── */
  --shadow-0: none;
  --shadow-1: 0 1px 0 rgba(17, 19, 21, 0.04);
  --shadow-2: 0 8px 24px rgba(17, 19, 21, 0.06);          /* card hover */
  --shadow-3: 0 18px 48px -12px rgba(17, 19, 21, 0.12);   /* modal / lift */
  --shadow-inset: inset 0 0 0 1px var(--rule);
  --shadow-gold: 0 0 0 1px var(--ether-gold);             /* ceremonial */

  /* ── Motion ────────────────────────────────────────────── */
  --ease-out:      cubic-bezier(0.2, 0.6, 0.2, 1);
  --ease-in-out:   cubic-bezier(0.65, 0, 0.35, 1);
  --dur-fast:      120ms;
  --dur-base:      200ms;
  --dur-slow:      400ms;
  --dur-ritual:    900ms;   /* atmospheric, contemplative */
}

/* ============================================================
   Semantic type roles
   Use these classes (or copy the rules) anywhere.
   ============================================================ */

.serif       { font-family: var(--font-serif);  font-weight: 400; }
.sans        { font-family: var(--font-sans); }
.mono        { font-family: var(--font-mono); }
.body        { font-family: var(--font-body); }

.display {
  font-family: var(--font-serif);
  font-weight: 400;
  font-size: var(--t-display);
  line-height: 1.08;
  letter-spacing: var(--track-display);
  color: var(--fg-1);
}

.h1 {
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: var(--t-h1);
  line-height: 1.12;
  letter-spacing: var(--track-tight);
  color: var(--fg-1);
}

.h2 {
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: var(--t-h2);
  line-height: 1.18;
  letter-spacing: var(--track-tight);
  color: var(--fg-1);
}

.h3 {
  font-family: var(--font-serif);
  font-weight: 600;
  font-size: var(--t-h3);
  line-height: 1.25;
  color: var(--fg-1);
}

.h4 {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: var(--t-h4);
  line-height: 1.35;
  letter-spacing: 0.04em;
  color: var(--fg-1);
}

.lead {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 300;
  font-size: var(--t-lead);
  line-height: 1.7;
  color: var(--fg-2);
}

p, .p {
  font-family: var(--font-body);
  font-size: var(--t-body);
  line-height: 1.7;
  color: var(--fg-2);
  text-wrap: pretty;
}

.small {
  font-family: var(--font-body);
  font-size: var(--t-small);
  line-height: 1.6;
  color: var(--fg-3);
}

.eyebrow {
  font-family: var(--font-sans);
  font-size: var(--t-eyebrow);
  letter-spacing: var(--track-eyebrow);
  text-transform: uppercase;
  color: var(--fg-4);
  font-weight: 400;
}

.label {
  font-family: var(--font-mono);
  font-size: var(--t-label);
  letter-spacing: var(--track-label);
  text-transform: uppercase;
  color: var(--fg-3);
  font-weight: 500;
}

.data, code, .code {
  font-family: var(--font-mono);
  font-size: var(--t-data);
  letter-spacing: var(--track-data);
  color: var(--fg-2);
}

.principle {                  /* The 'gem' line: italic serif, ceremonial */
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 300;
  font-size: 22px;
  line-height: 1.55;
  color: var(--ether-gold);
}

/* ============================================================
   Base reset (opinionated)
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-body);
  font-size: var(--t-body);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

::selection { background: var(--ether-gold); color: var(--obsidian-ink); }


/* ──────────────────────────────────────────────────────────────
   UI KIT — namespaced styles (.bc-*)
   ────────────────────────────────────────────────────────────── */
/* ============================================================
   brielos.com UI kit — namespaced styles (.bc-*)
   Surfaces: vellum + obsidian footer; serif-led editorial.
   ============================================================ */

.bc-app {
  background: var(--vellum);
  color: var(--obsidian-ink);
  font-family: var(--font-body);
  min-height: 100vh;
}

.bc-container { max-width: 1200px; margin: 0 auto; padding: 0 56px; }

/* ── Header ─────────────────────────────────────────────── */
.bc-header {
  position: sticky; top: 0; z-index: 100;
  padding: 22px 0;
  background: rgba(250, 247, 240, 0.94);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--rule);
}
.bc-header-row { display: flex; justify-content: space-between; align-items: center; }
.bc-logo { display: inline-flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; }
.bc-logo-mark { font-family: var(--font-serif); font-size: 18px; font-weight: 700; color: var(--storm-teal); line-height: 1; }
.bc-logo-word { font-family: var(--font-serif); font-size: 15px; font-weight: 700; letter-spacing: 0.1em; color: var(--storm-teal); }
.bc-nav { display: flex; gap: 36px; }
.bc-nav-link {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--fg-3); text-decoration: none;
  cursor: pointer; transition: color 200ms var(--ease-out);
}
.bc-nav-link:hover, .bc-nav-link.is-active { color: var(--storm-teal); }

/* ── Hero ───────────────────────────────────────────────── */
.bc-hero { padding: 110px 0 90px; border-bottom: 1px solid var(--rule); }
.bc-hero-inner { max-width: 820px; margin: 0 auto; text-align: center; }
.bc-eyebrow {
  display: inline-block; font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--oxide-copper); margin-bottom: 28px; font-weight: 500;
}
.bc-hero-title {
  font-family: var(--font-serif); font-weight: 500;
  font-size: clamp(40px, 5vw, 60px); line-height: 1.1;
  letter-spacing: -0.015em; color: var(--obsidian-ink);
  margin: 0 0 22px;
}
.bc-hero-highlight { font-style: italic; color: var(--storm-teal); }
.bc-hero-lead {
  font-family: var(--font-serif); font-style: italic; font-weight: 300;
  font-size: 19px; line-height: 1.75; color: var(--soft-graphite);
  max-width: 640px; margin: 0 auto;
}

/* ── ARKE grid ──────────────────────────────────────────── */
.bc-arke-grid { padding: 80px 0; border-bottom: 1px solid var(--rule); }
.bc-arke-grid-inner { display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px; }
@media (max-width: 1080px) { .bc-arke-grid-inner { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px)  { .bc-arke-grid-inner { grid-template-columns: 1fr; } }

.bc-arke-card {
  position: relative;
  background: #fff;
  border: 1px solid var(--rule);
  padding: 36px 28px 30px;
  display: flex; flex-direction: column;
  transition: border-color 300ms var(--ease-out), box-shadow 300ms var(--ease-out);
}
.bc-arke-card:hover {
  border-color: var(--storm-teal);
  box-shadow: 0 8px 24px rgba(17, 19, 21, 0.06);
}
.bc-arke-icon { color: var(--deep-forest); margin-bottom: 20px; }
.bc-glyph { width: 42px; height: 42px; }
.bc-arke-title {
  font-family: var(--font-serif); font-weight: 600;
  font-size: 26px; color: var(--obsidian-ink);
  margin: 0 0 6px; line-height: 1.2;
}
.bc-arke-sub {
  font-family: var(--font-mono); font-weight: 600;
  font-size: 11px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--storm-teal);
  margin-bottom: 18px;
}
.bc-arke-desc {
  font-family: var(--font-body); font-size: 14px;
  line-height: 1.7; color: var(--soft-graphite);
  flex-grow: 1; margin: 0 0 24px;
}
.bc-arke-link {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--storm-teal); text-decoration: none;
  align-self: flex-start; cursor: pointer;
  transition: color 200ms var(--ease-out);
}
.bc-arke-link span { display: inline-block; transition: transform 300ms var(--ease-out); }
.bc-arke-link:hover { color: var(--oxide-copper); }
.bc-arke-card:hover .bc-arke-link span { transform: translateX(4px); }

/* ── Badges ─────────────────────────────────────────────── */
.bc-badge {
  position: absolute; top: 24px; right: 24px;
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--font-mono); font-weight: 600; font-size: 9px;
  letter-spacing: 0.18em; text-transform: uppercase;
  padding: 4px 8px; border-radius: 2px;
}
.bc-badge-dot { width: 5px; height: 5px; border-radius: 999px; background: currentColor; }
.bc-badge-live { background: rgba(31, 59, 52, 0.08); color: var(--deep-forest); }
.bc-badge-coming { background: rgba(154, 106, 74, 0.10); color: var(--oxide-copper); }

/* ── Editorial section (label rail) ─────────────────────── */
.bc-section {
  padding: 90px 0;
  border-bottom: 1px solid var(--rule);
}
.bc-section--alt { background: var(--bone-white-2); }
.bc-section > .bc-container {
  display: grid; grid-template-columns: 160px 1fr; gap: 60px;
}
.bc-section-rail { display: flex; flex-direction: column; gap: 8px; padding-top: 10px; }
.bc-section-num {
  font-family: var(--font-mono); font-weight: 600; font-size: 12px;
  letter-spacing: 0.22em; color: var(--ether-gold);
}
.bc-section-num-label {
  font-family: var(--font-sans); font-size: 10px;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--ash-mauve);
}
.bc-section-body { max-width: 760px; }
.bc-h2 {
  font-family: var(--font-serif); font-weight: 500;
  font-size: clamp(30px, 3.4vw, 40px); line-height: 1.2;
  letter-spacing: -0.01em; color: var(--obsidian-ink); margin: 0 0 22px;
}
.bc-lead {
  font-family: var(--font-serif); font-style: italic; font-weight: 300;
  font-size: 19px; line-height: 1.75; color: var(--iron-slate);
  margin: 0 0 40px; max-width: 640px;
}

/* ── Laws & methodology grids ──────────────────────────── */
.bc-laws-grid, .bc-method-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px;
  margin-top: 28px;
}
.bc-law, .bc-method { display: flex; flex-direction: column; }
.bc-law-num, .bc-method-num {
  font-family: var(--font-mono); font-weight: 600;
  font-size: 32px; color: var(--storm-teal);
  opacity: 0.5; margin-bottom: 14px; line-height: 1;
}
.bc-law-title, .bc-method-title {
  font-family: var(--font-serif); font-weight: 600; font-size: 19px;
  margin: 0 0 12px; color: var(--obsidian-ink); line-height: 1.3;
}
.bc-law-body, .bc-method-body {
  font-family: var(--font-body); font-size: 14px;
  line-height: 1.75; color: var(--soft-graphite); margin: 0;
}

/* ── CTA ────────────────────────────────────────────────── */
.bc-cta { padding: 90px 0; text-align: center; }
.bc-cta-title { margin-bottom: 16px; }
.bc-cta-body { margin: 0 auto 36px; }
.bc-btn-group { display: inline-flex; gap: 14px; justify-content: center; }
.bc-btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 28px; border: 1px solid var(--obsidian-ink);
  background: var(--obsidian-ink); color: var(--bone-white);
  font-family: var(--font-mono); font-weight: 500; font-size: 11px;
  letter-spacing: 0.18em; text-transform: uppercase;
  cursor: pointer; transition: all 200ms var(--ease-out);
}
.bc-btn:hover { background: transparent; color: var(--obsidian-ink); }
.bc-btn--sec { background: transparent; color: var(--obsidian-ink); }
.bc-btn--sec:hover { background: var(--obsidian-ink); color: var(--bone-white); }

/* ── Footer ─────────────────────────────────────────────── */
.bc-footer {
  background: var(--obsidian-ink); padding: 36px 0;
  text-align: center;
}
.bc-footer p {
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 0.16em; color: #B7B0A4; margin: 0;
}

/* ── Positioning page ───────────────────────────────────── */
.bc-prose {
  font-family: var(--font-body); font-size: 16px; line-height: 1.85;
  color: var(--iron-slate);
}
.bc-prose p { margin: 0 0 22px; }
.bc-prose strong { color: var(--obsidian-ink); font-weight: 600; }
.bc-divider { height: 1px; background: var(--rule); margin: 36px 0; }


</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState } = React;

/* global React */

function Header({ active = "home", onNav }) {
  const items = [
    { id: "home", label: "Home" },
    { id: "doctrine", label: "Doctrine" },
    { id: "deployments", label: "Deployments" },
    { id: "contact", label: "Contact" }
  ];
  return (
    <header className="bc-header">
      <div className="bc-container bc-header-row">
        <a className="bc-logo" onClick={() => onNav && onNav("home")}>
          <span className="bc-logo-mark">◆</span>
          <span className="bc-logo-word">BRIELOS</span>
        </a>
        <nav className="bc-nav">
          {items.map(i => (
            <a
              key={i.id}
              className={"bc-nav-link " + (active === i.id ? "is-active" : "")}
              onClick={() => onNav && onNav(i.id)}
            >
              {i.label}
            </a>
          ))}
        </nav>
      </div>
    </header>
  );
}

window.Header = Header;


/* ───────────────────────────── */

/* global React */
function Hero({ eyebrow, title, highlight, lead, children }) {
  // title may include {highlight} marker — render that span in storm-teal italic
  const renderTitle = () => {
    if (highlight && title.includes(highlight)) {
      const parts = title.split(highlight);
      return (
        <>
          {parts[0]}
          <em className="bc-hero-highlight">{highlight}</em>
          {parts[1]}
        </>
      );
    }
    return title;
  };
  return (
    <section className="bc-hero">
      <div className="bc-container bc-hero-inner">
        {eyebrow && <span className="bc-eyebrow">{eyebrow}</span>}
        <h1 className="bc-hero-title">{renderTitle()}</h1>
        {lead && <p className="bc-hero-lead">{lead}</p>}
        {children}
      </div>
    </section>
  );
}
window.Hero = Hero;


/* ───────────────────────────── */

/* global React */
function ArkeGlyph({ kind = "law" }) {
  const stroke = { fill: "none", stroke: "currentColor", strokeWidth: 1.5, strokeLinecap: "round", strokeLinejoin: "round" };
  if (kind === "law") return (
    <svg className="bc-glyph" viewBox="0 0 52 52">
      <g {...stroke}>
        <line x1="12" y1="18" x2="24" y2="18"/><line x1="28" y1="18" x2="40" y2="18"/>
        <line x1="26" y1="8" x2="26" y2="28"/><line x1="12" y1="18" x2="26" y2="8"/>
        <line x1="40" y1="18" x2="26" y2="8"/><line x1="20" y1="28" x2="32" y2="28"/>
      </g>
    </svg>
  );
  if (kind === "bid") return (
    <svg className="bc-glyph" viewBox="0 0 52 52">
      <g {...stroke}>
        <line x1="26" y1="8" x2="40" y2="20"/><line x1="40" y1="20" x2="40" y2="32"/>
        <line x1="40" y1="32" x2="26" y2="44"/><line x1="26" y1="44" x2="12" y2="32"/>
